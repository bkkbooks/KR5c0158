front:
  text: 太上太清天童護命妙經註序是八夫太上者玄元之王萬聖之師至上无尊至髙無位上則包羅衆象中則普濟羣生下則長養萬物生生化化受炁於太始之中物物頭頭稟道在虛无之内千變萬化无不太上矣故天道者運爲清陽之炁也童徳者動合純粹之眞也兩機相契妙用爲一護命養生神明佑助兇虎无由所傷毒蟲焉能所害何爲堅固至在於神之機也太上太清天童護命妙經註
  hash: sha256:a545d8320d22c0aa2cb2a2c59ed519b4be2133c31f8ae15835dc18cc4e5c4904
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5c0158_SJB_000-170209c, image: sjb/17/170209c.png}
body:
  text: 姑射山太玄子侯善淵註太上太清天童髙眞攝化神用无方頌曰太上玄元第一尊趺蓮髙坐玉清宮天童妙化圓明體光鑑寰瀛萬象空護命妙經誦者除邪修之攝正頌曰太上親傳護命經玄言直語甚分眀清晨默念持三徧无限羣魔盡失驚皇天生我金公道父覆我之眞頌曰萬物因從道炁生皇天育我氣神清壼中逗引龍行火鼎内金丹漸結成皇地載我黃婆牝母運我之形頌曰一炁沖和萬物彰本因生産在中央丹田養就靈仙藥始覺神遊入帝郷日月照我天地之精感而純陽頌曰交逕烏飛兎走波二輪晶耀越天河達人到此開青眼試問凡夫認得麽北斗輔我心通七竅斗柄分明頌曰斡開斗口運天關兩點流星任往還鼎眼滿傾銀浪滚爐門一派水晶翻星辰榮我滿天精秀照我神凝頌曰極目陽精數點輝往來昇降疾如飛空中頥養胎仙就穏跨金龍入太微江河渡我曲江金水穩駕神舟頌曰靈波滚滚接東流傾入汪洋法海收穩駕神舟淤歴徧水心直下釣龍鈎北展侍我北辰初顯侍我同明頌曰北極玄微鎭碧霄心開頓悟亦非遥胎光一點澄凝處萬道流霞物外飄風兩送我寰中虛靜雨過風清頌曰薄霧輕煙細雨霏遠嵐凝翠可相宜清風送我歸何處拍劎騎龍上紫微諸仙舉我衆眞相助一體无分頌曰諸仙舉我朝三界衆聖相扶入帝京金闕門中呼羽客玉霄榜上列仙名司命與我天中司命與我同源頌曰司命從容意自清介然與我育神嬰嬰兒長大渾无物一顆靈光處處明太一任我太一玄機任我神通頌曰太一爐開師子吼混元鼎破火龍飛滿天光焰燒空界萬派精金照日輝六丁進我六門通泰進我神遊頌曰六丁進我任遨遊散髮披襟跨火牛仗劔咬牙吞日月飛符追下活人頭玉女從我金童前引玉女後隨頌曰玉女相隨入洞遊笙歌引上水晶樓凭欄不見紅塵事唯有虛空泛日頭五帝衞我五般霞彩聚入神宮頌曰五炁朝元入寳宫三花片片落空中玄珠配合生光瑩徧照乾坤上下通天門開我上朝金闕出入夷門頌曰閑騎白馬上天門信步因遊翫月宮寶殿姮娥新有令賜余丹桂一枝紅地戸通我心通兩竅神致无方頌曰一擊玄關地户開絳宮仙子上靈臺徧觀極目瓊花綻盡向紅爐火裏栽我命著我性命俱備精炁神全頌曰養炁全神別有方安魂定魄不飛颺丹成巳覺心通聖鑿壁穿山透海滄太清玄籍太清之道玄籍萬神頌曰太清永劫鎭夷門萬化生乎在彼中一性貫穿天地匝金嬰還返玉晨宮三宫昇降上昇下降三一浮沉頌曰三宮昇降定浮沉達者心開性自深太一爐添文武火硃砂鼎裏鍊精金上下往來无窮親遠踈近大計无窮頌曰上下无窮不見形无形之體自然清蠲蠲贈得靈砂滿燦燦交光照眼眀金飯玉漿向求皆至天然一味食者延年頌曰一盤金飯浸瓊漿啜罷神清入太倉五色雲中朝聖主紫微殿裏奏明皇虚梵日月虚懸寳鑑道眼髙明頌曰虛梵煌煌映大羅髙懸日月照婆娑鼎中汞水㳙㳙滴鑄就紅砂滿鼎多與天爲誓天性人也人心機也頌曰天性人兮人象天天人相契立根元根元混一歸何處蕩蕩茫茫萬化前𩵄魒䰢魁北極之號受正除邪頌曰北極元君鎮上方咬牙執劎斬魔王妖精魍魎全俱滅緫化无形變血光所爲者成背之者死向之則生頌曰修成丹藥永无枯玄牝空中任吸呼白虎每吞金凰髓烏龍常飲太陽酥何神不使人人有分物物皆從頌曰萬神同喜聚三光至道无生得久長常使汞鉛顚倒用自然丹就得純陽何令不行天地萬物受炁而生頌曰一陽初動黃芽秀二炁相交白雪清兩味合和十六兩完客一粒寶珠明上有朱雀火龍蟠頂丹鳯凝陽頌曰朱雀離巢趂日飛上侵天谷徹雲霓展開金翅磨星斗推落陽光滿太微下有玄武烏龜水府太隂之精頌曰玄武交宮水府行赤蛇相繞火中生刹那一井金波湧傾入紅爐滿鼎烹左有青龍龍從震位汞自西生頌曰青龍一踴出束渝舒展紅霞罩玉都兩道電光昕霹靂三天驚動鎭江湖右有白虎虎從兊位鉛自束生頌曰白虎深藏入兊方須彌靜坐泛龍光射開宇宙羣魔退獨霸山川鎭海滄愛我者生全神養炁保命長生頌曰隂陽火候勿令差鉛鼎飛霜吐翠砂一粒明珠顚倒滚滿天精耀放紅霞惡我者殃貪嗔損炁嫉妬傷神頌曰貪嗔嫉妬勿交生信任寰中自在行清靜若逢尸鬼閙袖中携劔斬三彭謀我者死財色利名親之者死頌曰功名富貴莫爭儸愛慾恩深業轉多達士超然俱逺避迷人不悟永耽𧿶憎我者亡心猿意馬縱之則亡頌曰邪魔隂鬼亂交紛握固存神意不容寂靜若逢塵事撓放開心月照虛空玉女三千六百常在我傍萬神聚㑹不離我身頌曰一簇神仙秀炁清彩雲深處賀昇平空中一派仙音奏捧箇眞人入洞庭執節奉符與我同遊行住坐卧動止相隨頌曰玉女同遊不夜郷鳯鸞迎駕入明堂金童滿勸瓊漿液味覺清香透頂涼太上攝京高眞攝位衆聖來朝頌曰太上扶空坐寶蓮放開恵日照无邊諸仙緫攝髙眞位衆聖來朝御坐前天大吉昌寥寥空靜湛淇盈虛頌曰混元一炁定沉浮獨立寥空萬象初渺渺玄玄千劫外澄澄湛湛覆虚无二十四符神符去病心印餘邪頌曰神符斷祟隂消滅心印除邪道自生金籙玄科親授訣濟民助國永清平與星暦俱星河玉潔心月氷清頌曰星河皎潔透銀蟾无上具人至仰瞻五女掣開秋水殿金童舒起夜眀簾急急如律令經中得意急急修持頌曰功行齊修兩事全煥然輕舉化飛仙青童引至朝元去鶴駕香風入洞天太上太清天童護命妙經註
