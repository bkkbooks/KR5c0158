front:
  text: 太上太清天童護命妙經注序是八夫太上者玄元之王萬聖之師至上無尊至髙無位上則包羅衆象中則普濟羣生下則長養萬物生生化化受氣於太始之中物物頭頭稟道在虛無之內千變萬化無不太上矣故天道者運為清陽之氣也童德者動合純粹之真也兩機相契妙用為一護命養生神明佑助凶虎無由所傷毒蟲焉能所害何為堅固至在於神之機也太上太清天童護命妙經注
  hash: sha256:cc111e3e62f456ca1d1c738a4770a9ad46e074ec2d07e5eaf96205d2e39b94bf
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5c0158_HFL_000-001a, image: hfl/0533/0533-214.png}
body:
  text: 姑射山太玄子侯善淵注太上太清天童髙真攝化神用無方頌曰太上玄元第一尊趺蓮髙坐玉清宮天童妙化圓明體光鑑寰瀛萬象空護命妙經誦者除邪修之攝正頌曰太上親傳護命經玄言直語甚分眀清晨默念持三遍無限羣魔盡失驚皇天生我金公道父覆我之真頌曰萬物因從道氣生皇天育我氣神清壼中逗引龍行火鼎內金丹漸結成皇地載我黃婆牝母運我之形頌曰一氣沖和萬物彰本因生産在中央丹田養就靈仙藥始覺神遊入帝鄉日月照我天地之精感而純陽頌曰交徑烏飛兔走波二輪晶耀越天河達人到此開青眼試問凡夫認得麼北斗輔我心通七竅斗柄分明頌曰斡開斗口運天關兩點流星任往還鼎眼滿傾銀浪滚爐門一派水晶翻星辰榮我滿天精秀照我神凝頌曰極目陽精數點輝往來升降疾如飛空中頥養胎仙就穩跨金龍入太微江河渡我曲江金水穩駕神舟頌曰靈波滚滚接東流傾入汪洋法海收穩駕神舟淤歷遍水心直下釣龍鈎北展侍我北辰初顯侍我同明頌曰北極玄微鎮碧霄心開頓悟亦非遙胎光一點澄凝處萬道流霞物外飄風兩送我寰中虛靜雨過風清頌曰薄霧輕煙細雨霏遠嵐凝翠可相宜清風送我歸何處拍劎騎龍上紫微諸仙舉我衆真相助一體無分頌曰諸仙舉我朝三界衆聖相扶入帝京金闕門中呼羽客玉霄榜上列仙名司命與我天中司命與我同源頌曰司命從容意自清介然與我育神嬰嬰兒長大渾無物一顆靈光處處明太一任我太一玄機任我神通頌曰太一爐開師子吼混元鼎破火龍飛滿天光焰燒空界萬派精金照日輝六丁進我六門通泰進我神遊頌曰六丁進我任遨遊散髮披襟跨火牛仗劔咬牙吞日月飛符追下活人頭玉女從我金童前引玉女後隨頌曰玉女相隨入洞遊笙歌引上水晶樓憑欄不見紅塵事唯有虛空泛日頭五帝衛我五般霞彩聚入神宮頌曰五氣朝元入寶宫三花片片落空中玄珠配合生光瑩遍照乾坤上下通天門開我上朝金闕出入夷門頌曰間騎白馬上天門信步因遊玩月宮寶殿姮娥新有令賜余丹桂一枝紅地戶通我心通兩竅神致無方頌曰一擊玄關地户開絳宮仙子上靈臺遍觀極目瓊花綻盡向紅爐火裏栽我命著我性命俱備精氣神全頌曰養氣全神別有方安魂定魄不飛揚丹成巳覺心通聖鑿壁穿山透海滄太清玄籍太清之道玄籍萬神頌曰太清永劫鎮夷門萬化生乎在彼中一性貫穿天地匝金嬰還返玉晨宮三宫升降上升下降三一浮沉頌曰三宮升降定浮沉達者心開性自深太一爐添文武火硃砂鼎裏鍊精金上下往來無窮親遠踈近大計無窮頌曰上下無窮不見形無形之體自然清蠲蠲贈得靈砂滿燦燦交光照眼眀金飯玉漿向求皆至天然一味食者延年頌曰一盤金飯浸瓊漿啜罷神清入太倉五色雲中朝聖主紫微殿裏奏明皇虛梵日月虛懸寶鑑道眼髙明頌曰虛梵煌煌映大羅髙懸日月照婆娑鼎中汞水涓涓滴鑄就紅砂滿鼎多與天為誓天性人也人心機也頌曰天性人兮人象天天人相契立根元根元混一歸何處蕩蕩茫茫萬化前𩵄魒䰢魁北極之號受正除邪頌曰北極元君鎮上方咬牙執劎斬魔王妖精魍魎全俱滅總化無形變血光所為者成背之者死向之則生頌曰修成丹藥永無枯玄牝空中任吸呼白虎每吞金凰髓烏龍常飲太陽酥何神不使人人有分物物皆從頌曰萬神同喜聚三光至道無生得久長常使汞鉛顚倒用自然丹就得純陽何令不行天地萬物受氣而生頌曰一陽初動黃芽秀二氣相交白雪清兩味合和十六兩完客一粒寶珠明上有朱雀火龍蟠頂丹鳯凝陽頌曰朱雀離巢趂日飛上侵天谷徹雲霓展開金翅磨星斗推落陽光滿太微下有玄武烏龜水府太隂之精頌曰玄武交宮水府行赤蛇相繞火中生剎那一井金波湧傾入紅爐滿鼎烹左有青龍龍從震位汞自西生頌曰青龍一踴出束渝舒展紅霞罩玉都兩道電光昕霹靂三天驚動鎮江湖右有白虎虎從兊位鉛自束生頌曰白虎深藏入兊方須彌靜坐泛龍光射開宇宙羣魔退獨霸山川鎮海滄愛我者生全神養氣保命長生頌曰隂陽火候勿令差鉛鼎飛霜吐翠砂一粒明珠顚倒滚滿天精耀放紅霞惡我者殃貪嗔損氣嫉妬傷神頌曰貪嗔嫉妬勿交生信任寰中自在行清靜若逢尸鬼閙袖中携劔斬三彭謀我者死財色利名親之者死頌曰功名富貴莫爭儸愛欲恩深業轉多達士超然俱逺避迷人不悟永耽跎憎我者亡心猿意馬縱之則亡頌曰邪魔隂鬼亂交紛握固存神意不容寂靜若逢塵事撓放開心月照虛空玉女三千六百常在我傍萬神聚會不離我身頌曰一簇神仙秀氣清彩雲深處賀升平空中一派仙音奏捧箇真人入洞庭執節奉符與我同遊行住坐卧動止相隨頌曰玉女同遊不夜鄉鳯鸞迎駕入明堂金童滿勸瓊漿液味覺清香透頂涼太上攝京高真攝位衆聖來朝頌曰太上扶空坐寶蓮放開惠日照無邊諸仙總攝髙真位衆聖來朝御坐前天大吉昌寥寥空靜湛淇盈虛頌曰混元一氣定沉浮獨立寥空萬象初渺渺玄玄千劫外澄澄湛湛覆虛無二十四符神符去病心印餘邪頌曰神符斷祟隂消滅心印除邪道自生金籙玄科親授訣濟民助國永清平與星曆俱星河玉潔心月氷清頌曰星河皎潔透銀蟾無上具人至仰瞻五女掣開秋水殿金童舒起夜眀簾急急如律令經中得意急急修持頌曰功行齊修兩事全煥然輕舉化飛仙青童引至朝元去鶴駕香風入洞天太上太清天童護命妙經注
